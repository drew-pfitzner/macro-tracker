<body>
<div class="wrap">

  <!-- Header -->

  <div class="header">
    <div>
      <div class="label">DINNER → DINNER CYCLE</div>
      <h1>Fuel <span>Gauge</span></h1>
    </div>
    <button class="new-cycle-btn" id="resetBtn">NEW CYCLE</button>
  </div>

  <!-- Gauges -->

  <div class="card" style="padding: 22px 22px 14px;">
    <div class="gauge" id="calGauge"></div>
    <div class="gauge" id="proGauge"></div>
  </div>

  <!-- Tabs -->

  <div class="tabs">
    <button class="tab-btn active" data-tab="log">LOG</button>
    <button class="tab-btn" data-tab="saved">SAVED</button>
    <button class="tab-btn" data-tab="settings">SETTINGS</button>
  </div>

  <!-- Log Tab -->

  <div id="tab-log" class="card">
    <div class="section-label" style="margin-bottom:10px;">ADD FOOD</div>
    <div class="input-row">
      <input type="text" id="foodInput" placeholder="e.g. WPC 2 scoops, 14g honey"/>
      <button class="add-btn" id="addBtn">+ Add</button>
    </div>
    <div class="toggle-row" id="saveToggleRow">
      <div class="toggle" id="saveToggle"><div class="toggle-knob"></div></div>
      <span class="toggle-label" id="saveToggleLabel">SAVE TO LIBRARY</span>
    </div>
    <div class="error" id="errorMsg" style="display:none;"></div>
    <div class="log-divider">
      <div class="section-label">TODAY'S LOG</div>
      <div id="logList"></div>
      <div class="totals-row" id="totalsRow" style="display:none;">
        <span><span id="totalCalDisp" style="color:#f4a261;"></span> kcal</span>
        <span><span id="totalProDisp" style="color:#52b788;"></span>g protein</span>
      </div>
    </div>
  </div>

  <!-- Saved Tab -->

  <div id="tab-saved" class="card" style="display:none;">
    <div class="section-label">SAVED FOODS</div>
    <div id="savedList"></div>
  </div>

  <!-- Settings Tab -->

  <div id="tab-settings" class="card" style="display:none;">
    <div class="section-label" style="margin-bottom:16px;">SETTINGS</div>
    <div class="settings-label">GEMINI API KEY</div>
    <div id="keyArea"></div>
  </div>

  <div class="footer">DATA PERSISTS · TAP NEW CYCLE TO RESET</div>
</div>

<script>
  const CAL_TARGET = 2100;
  const PRO_TARGET = 150;
  const MEAL_COLORS = { Breakfast:"#f4a261", Lunch:"#52b788", Dinner:"#4cc9f0", Snack:"#c77dff", Drink:"#90e0ef", Treat:"#f72585" };

  // State
  let log = JSON.parse(localStorage.getItem("fg-log") || "[]");
  let saved = JSON.parse(localStorage.getItem("fg-saved") || "[]");
  let apiKey = localStorage.getItem("fg-key") || "";
  let saveNext = false;
  let resetConfirm = false;
  let resetTimer = null;
  let loading = false;
  let activeTab = "log";

  function persist() {
    localStorage.setItem("fg-log", JSON.stringify(log));
    localStorage.setItem("fg-saved", JSON.stringify(saved));
    localStorage.setItem("fg-key", apiKey);
  }

  // Gauge renderer
  function renderGauge(el, label, value, target, color, unit) {
    const pct = Math.min((value / target) * 100, 100);
    const over = value > target;
    const segs = Array.from({length:20}).map((_,i) => {
      const filled = (i/20)*100 < pct;
      return `<div class="gauge-seg${filled?' filled':''}" style="${filled?`background:${over?'#ff6b6b':color};box-shadow:0 0 6px ${color}55`:''}"></div>`;
    }).join('');
    el.innerHTML = `
      <div class="gauge-header">
        <span class="gauge-label">${label}</span>
        <span class="gauge-val">
          <span class="current" style="color:${over?'#ff6b6b':color}">${Math.round(value)}</span>
          <span class="target"> / ${target}${unit}</span>
        </span>
      </div>
      <div class="gauge-bar">${segs}</div>
      <div class="gauge-remaining">${over ? `⚠ ${Math.round(value-target)}${unit} over` : `${Math.round(target-value)}${unit} remaining`}</div>
    `;
  }

  function renderGauges() {
    const totalCal = log.reduce((s,e) => s+e.cal, 0);
    const totalPro = log.reduce((s,e) => s+e.pro, 0);
    renderGauge(document.getElementById('calGauge'), 'Calories', totalCal, CAL_TARGET, '#f4a261', ' kcal');
    renderGauge(document.getElementById('proGauge'), 'Protein', totalPro, PRO_TARGET, '#52b788', 'g');
    document.getElementById('totalCalDisp').textContent = totalCal;
    document.getElementById('totalProDisp').textContent = totalPro;
    document.getElementById('totalsRow').style.display = log.length ? 'flex' : 'none';
  }

  function entryHTML(entry, isLog) {
    const color = MEAL_COLORS[entry.meal] || '#555';
    const meta = isLog
      ? `<span style="color:${color}">${entry.meal}</span> · ${entry.cal} kcal · ${entry.pro}g protein`
      : `${entry.cal} kcal · ${entry.pro}g protein`;
    const actions = isLog
      ? `<button class="remove-btn" onclick="removeLog('${entry.id}')">×</button>`
      : `<button class="save-btn" onclick="logSaved('${entry.id}')">+ LOG</button>
         <button class="remove-btn" onclick="removeSaved('${entry.id}')">×</button>`;
    return `
      <div class="entry">
        <div class="entry-bar" style="background:${color}"></div>
        <div class="entry-info">
          <div class="entry-name">${entry.item}</div>
          <div class="entry-meta">${meta}</div>
        </div>
        ${actions}
      </div>`;
  }

  function renderLog() {
    const el = document.getElementById('logList');
    el.innerHTML = log.length
      ? log.map(e => entryHTML(e, true)).join('')
      : '<div class="empty">— nothing logged yet —</div>';
    renderGauges();
  }

  function renderSaved() {
    const el = document.getElementById('savedList');
    el.innerHTML = saved.length
      ? saved.map(e => entryHTML(e, false)).join('')
      : '<div class="empty">— no saved foods yet —<br><span style="color:#2a2a2a">toggle "save to library" when logging</span></div>';
  }

  function renderKeyArea() {
    const el = document.getElementById('keyArea');
    if (apiKey) {
      el.innerHTML = `
        <div style="display:flex;gap:8px;">
          <div class="key-saved">✓ Key saved</div>
          <button class="icon-btn" onclick="removeKey()">Remove</button>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="input-row" style="margin-bottom:8px;">
          <input type="password" id="keyInput" placeholder="AIza..."/>
          <button class="icon-btn" id="eyeBtn" onclick="toggleEye()">👁</button>
          <button class="add-btn" id="saveKeyBtn" onclick="saveKey()">Save</button>
        </div>
        <div class="hint">Get a free key at aistudio.google.com → Get API key<br>Stored locally in your browser only.</div>`;
    }
  }

  function render() {
    renderLog();
    renderSaved();
    renderKeyArea();
  }

  // Actions
  window.removeLog = function(id) {
    log = log.filter(e => e.id != id);
    persist(); renderLog();
  };
  window.removeSaved = function(id) {
    saved = saved.filter(e => e.id != id);
    persist(); renderSaved();
  };
  window.logSaved = function(id) {
    const item = saved.find(e => e.id == id);
    if (!item) return;
    log.push({ ...item, id: Date.now().toString() });
    persist(); renderLog();
  };
  window.removeKey = function() {
    apiKey = ""; persist(); renderKeyArea();
  };
  window.toggleEye = function() {
    const inp = document.getElementById('keyInput');
    const btn = document.getElementById('eyeBtn');
    if (!inp) return;
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  };
  window.saveKey = function() {
    const val = (document.getElementById('keyInput')?.value || '').trim();
    if (!val) return;
    apiKey = val; persist(); renderKeyArea();
  };

  // Toggle
  document.getElementById('saveToggleRow').addEventListener('click', () => {
    saveNext = !saveNext;
    const tog = document.getElementById('saveToggle');
    const lbl = document.getElementById('saveToggleLabel');
    tog.classList.toggle('on', saveNext);
    lbl.classList.toggle('on', saveNext);
  });

  // Reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!resetConfirm) {
      resetConfirm = true;
      document.getElementById('resetBtn').textContent = 'CONFIRM?';
      document.getElementById('resetBtn').classList.add('confirm');
      resetTimer = setTimeout(() => {
        resetConfirm = false;
        document.getElementById('resetBtn').textContent = 'NEW CYCLE';
        document.getElementById('resetBtn').classList.remove('confirm');
      }, 3000);
      return;
    }
    clearTimeout(resetTimer);
    resetConfirm = false;
    log = [];
    persist(); renderLog();
    document.getElementById('resetBtn').textContent = 'NEW CYCLE';
    document.getElementById('resetBtn').classList.remove('confirm');
  });

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ['log','saved','settings'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === activeTab ? 'block' : 'none';
      });
    });
  });

  // Add food
  async function addFood() {
    const input = document.getElementById('foodInput');
    const text = input.value.trim();
    if (!text || loading) return;
    if (!apiKey) {
      showError("Add your Gemini API key in Settings first.");
      document.querySelector('[data-tab="settings"]').click();
      return;
    }
    loading = true;
    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = '...';
    hideError();
    try {
      const entry = await parseWithGemini(text);
      log.push({ ...entry, id: Date.now().toString() });
      if (saveNext) {
        saved.push({ ...entry, id: (Date.now()+1).toString() });
        saveNext = false;
        document.getElementById('saveToggle').classList.remove('on');
        document.getElementById('saveToggleLabel').classList.remove('on');
      }
      input.value = '';
      persist(); render();
    } catch(e) {
      showError(e.message);
    }
    loading = false;
    btn.disabled = false; btn.textContent = '+ Add';
  }

  document.getElementById('addBtn').addEventListener('click', addFood);
  document.getElementById('foodInput').addEventListener('keydown', e => { if(e.key==='Enter') addFood(); });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function parseWithGemini(input) {
    const prompt = `You are a nutrition estimator. Given a food description, respond with ONLY a raw JSON object, no markdown, no backticks, no explanation.
Format: {"meal":"Breakfast","item":"clean item name","cal":number,"pro":number}
meal must be one of: Breakfast, Lunch, Dinner, Snack, Drink, Treat
cal = calories as integer, pro = grams of protein as integer.
Food: ${input}`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 200 }
        })
      }
    );
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err?.error?.message || `API error ${res.status}`);
    }
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const match = raw.match(/\{[\s\S]*?\}/);
    if (!match) throw new Error(`Unexpected response: ${raw.slice(0,80)}`);
    const parsed = JSON.parse(match[0]);
    if (!parsed.item || typeof parsed.cal !== 'number' || typeof parsed.pro !== 'number') throw new Error('Bad response shape');
    if (!['Breakfast','Lunch','Dinner','Snack','Drink','Treat'].includes(parsed.meal)) parsed.meal = 'Snack';
    return parsed;
  }

  // Init
  render();
</script>

</body>
